name: 更新个人统计

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 明确声明写入权限
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 获取 GitHub 统计并更新 README
      run: |
        # 获取 GitHub 用户数据
        USER_INFO=$(curl -s "https://api.github.com/users/QuantumEdgecode")
        
        # 解析统计数据
        FOLLOWERS=$(echo "$USER_INFO" | jq -r '.followers')
        PUBLIC_REPOS=$(echo "$USER_INFO" | jq -r '.public_repos')
        
        # 获取仓库详细信息统计
        REPOS=$(curl -s "https://api.github.com/users/QuantumEdgecode/repos?per_page=100")
        STARS=$(echo "$REPOS" | jq '[.[].stargazers_count] | add')
        FORKS=$(echo "$REPOS" | jq '[.[].forks_count] | add')
        TOTAL_ISSUES=$(echo "$REPOS" | jq '[.[].open_issues_count] | add')
        
        # 获取已关闭的 Issues
        CLOSED_ISSUES_SEARCH=$(curl -s "https://api.github.com/search/issues?q=author:QuantumEdgecode+type:issue+state:closed")
        CLOSED_ISSUES=$(echo "$CLOSED_ISSUES_SEARCH" | jq -r '.total_count')
        
        # 生成统计内容
        cat > stats.md << EOF
        Quantumedgecode  
        👁️ 关注者: $FOLLOWERS  

        - 📦 总仓库数: $PUBLIC_REPOS  
        - ⭐ 星标总数: $STARS  
        - 🍴 复刻总数: $FORKS  
        - 📝 总贡献数: $(curl -s "https://api.github.com/users/QuantumEdgecode/events/public?per_page=100" | jq '[.[] | select(.type == "PushEvent")] | length')  
        - 🐛 总问题数: $TOTAL_ISSUES  
        - ✅ 已关闭问题: $CLOSED_ISSUES
        EOF
        
        # 检查 README.md 是否存在标记
        if grep -q "<!-- STATS_START -->" README.md; then
          echo "找到标记，正在更新统计..."
          # 删除旧统计内容
          sed -i '/<!-- STATS_START -->/,/<!-- STATS_END -->/{//!d}' README.md
          # 插入新统计内容
          sed -i '/<!-- STATS_START -->/r stats.md' README.md
        else
          echo "未找到标记，正在添加统计..."
          # 在文件末尾添加标记和统计内容
          echo "" >> README.md
          echo "<!-- STATS_START -->" >> README.md
          cat stats.md >> README.md
          echo "<!-- STATS_END -->" >> README.md
        fi
        
        # 清理临时文件
        rm stats.md

    - name: 提交更改
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "📊 自动更新 GitHub 统计"
        file_pattern: README.md
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
